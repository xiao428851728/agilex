habitat_baselines:
  evaluate: true
  trainer_name: ppo
  updater_name: PPO
  distrib_updater_name: DDPPO
  torch_gpu_id: 0
  tensorboard_dir: tb
  writer_type: tb
  video_dir: video_dir
  video_fps: 10
  test_episode_count: -1
  eval_ckpt_path_dir: data/checkpoints
  num_environments: 1
  num_processes: -1
  rollout_storage_name: RolloutStorage
  checkpoint_folder: data/checkpoints
  num_updates: 10000
  num_checkpoints: 10
  checkpoint_interval: -1
  total_num_steps: -1.0
  log_interval: 10
  log_file: train.log
  force_blind_policy: false
  verbose: true
  eval_keys_to_include_in_name: []
  force_torch_single_threaded: false
  wb:
    project_name: ''
    entity: ''
    group: ''
    run_name: ''
  load_resume_state_config: true
  eval:
    split: val
    use_ckpt_config: true
    should_load_ckpt: true
    evals_per_ep: 1
    video_option: []
    extra_sim_sensors: {}
  profiling:
    capture_start_step: -1
    num_steps_to_capture: -1
  rl:
    agent:
      type: SingleAgentAccessMgr
    preemption:
      append_slurm_job_id: false
      save_resume_state_interval: 100
      save_state_batch_only: false
    policy:
      name: PointNavResNetPolicy
      action_distribution_type: categorical
      action_dist:
        use_log_std: true
        use_softplus: false
        std_init: ???
        log_std_init: 0.0
        use_std_param: false
        clamp_std: true
        min_std: 1.0e-06
        max_std: 1
        min_log_std: -5
        max_log_std: 2
        action_activation: tanh
        scheduled_std: false
      obs_transforms: {}
      hierarchical_policy: ???
    ppo:
      clip_param: 0.2
      ppo_epoch: 4
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 0.00025
      eps: 1.0e-05
      max_grad_norm: 0.5
      num_steps: 5
      use_gae: true
      use_linear_lr_decay: false
      use_linear_clip_decay: false
      gamma: 0.99
      tau: 0.95
      reward_window_size: 50
      use_normalized_advantage: false
      hidden_size: 512
      entropy_target_factor: 0.0
      use_adaptive_entropy_pen: false
      use_clipped_value_loss: true
      use_double_buffered_sampler: false
    ddppo:
      sync_frac: 0.6
      distrib_backend: GLOO
      rnn_type: GRU
      num_recurrent_layers: 1
      backbone: resnet18
      pretrained_weights: data/ddppo-models/gibson-2plus-resnet50.pth
      pretrained: false
      pretrained_encoder: false
      train_encoder: true
      reset_critic: true
      force_distributed: false
    ver:
      variable_experience: true
      num_inference_workers: 2
      overlap_rollouts_and_learn: false
    auxiliary_losses: {}
habitat:
  simulator:
    scene_dataset: /home/sxz/sjd/vlfm/data/scene_datasets/hm3d_v0.2/hm3d_annotated_basis.scene_dataset_config.json
    agents:
      main_agent:
        radius: 0.1
        height: 1.5
        max_climb: 0.2
        max_turn_angle: 30.0
        sim_sensors:
          rgb_sensor:
            type: HabitatSimRGBSensor
            width: 256
            height: 256
            position:
            - 0.0
            - 1.25
            - 0.0
            orientation:
            - 0.0
            - 0.0
            - 0.0
          depth_sensor:
            type: HabitatSimDepthSensor
            width: 256
            height: 256
            position:
            - 0.0
            - 1.25
            - 0.0
            orientation:
            - 0.0
            - 0.0
            - 0.0
  task:
    name: PointNav-v1
    sensors:
    - RGB_SENSOR
    - DEPTH_SENSOR
    - POINTGOAL_WITH_GPS_COMPASS_SENSOR
    measurements:
      success:
        success_distance: 1.0
  dataset:
    type: PointNav-v1
    split: val
    data_path: /home/sxz/sjd/vlfm/data/datasets/textinst_pointnav/hm3d/val/val.json.gz
    scenes_dir: /home/sxz/sjd/vlfm/data/scene_datasets
    content_scenes:
    - '*'
    environment:
      iterator_options:
        shuffle: false
        num_episode_sample: -1
        seed: 123
        max_scene_repeat_episodes: -1
        max_scene_repeat_steps: -1
        scene_repeat_coverage: 0.2
        group_by_scene: false
  environment:
    iterator_options:
      shuffle: false
      num_episode_sample: -1
      seed: 123
      max_scene_repeat_episodes: -1
      max_scene_repeat_steps: -1
      scene_repeat_coverage: 0.2
      group_by_scene: false
